server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cat_adoption?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  web:
    resources:
      static-locations: classpath:/META-INF/resources,classpath:/resources,classpath:/static,classpath:/public,file:E:/qClawProject/01-Java项目/CatAdoptionPlatform/uploads/

# JWT 配置
jwt:
  secret: ${JWT_SECRET:CatAdoptionPlatformSecretKey2024VeryLongSecretKeyForJWT}
  expiration: 86400000  # 24小时（毫秒）

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.catadoption.entity
  configuration:
    map-underscore-to-camel-case: true
